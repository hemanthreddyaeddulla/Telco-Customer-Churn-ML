name: Publish image

# Builds the serving image and pushes it to Docker Hub.
# Run it manually from the Actions tab (Actions -> "Publish image" -> Run workflow).
on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn:${{ github.sha }}
